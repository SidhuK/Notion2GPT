<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- Loading -->
    <div id="state-loading" class="state">
        <div class="spinner"></div>
    </div>

    <!-- Not Connected -->
    <div id="state-not-connected" class="state hidden">
        <img src="images/icon-96.png" alt="Notion2GPT" class="logo" width="48" height="48">
        <h2>Notion2GPT</h2>
        <p class="subtitle">Save your ChatGPT conversations to Notion</p>
        <button id="btn-connect" class="btn btn-primary">Connect to Notion</button>
    </div>

    <!-- Authorizing -->
    <div id="state-authorizing" class="state hidden">
        <div class="spinner"></div>
        <p class="status-text">Waiting for Notion authorization…</p>
        <button id="btn-cancel-auth" class="btn btn-secondary">Cancel</button>
    </div>

    <!-- Not on ChatGPT -->
    <div id="state-wrong-page" class="state hidden">
        <div class="icon-circle">
            <span class="icon-chat">💬</span>
        </div>
        <p class="status-text">Navigate to a ChatGPT conversation to save it</p>
    </div>

    <!-- Connected / Ready -->
    <div id="state-ready" class="state hidden">
        <button id="btn-settings" class="btn-icon" title="Settings" aria-label="Settings">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="10" cy="10" r="3"/>
                <path d="M10 1.5v2M10 16.5v2M3.4 3.4l1.4 1.4M15.2 15.2l1.4 1.4M1.5 10h2M16.5 10h2M3.4 16.6l1.4-1.4M15.2 4.8l1.4-1.4"/>
            </svg>
        </button>
        <div class="preview">
            <h3 id="chat-title" class="chat-title">Chat Title</h3>
            <div class="meta">
                <span id="chat-model" class="badge">GPT-4o</span>
                <span id="chat-messages" class="meta-text">0 messages</span>
            </div>
        </div>
        <button id="btn-save" class="btn btn-primary">Save to Notion</button>
    </div>

    <!-- Saving -->
    <div id="state-saving" class="state hidden">
        <div class="spinner"></div>
        <p class="status-text">Saving to Notion…</p>
    </div>

    <!-- Saved -->
    <div id="state-saved" class="state hidden">
        <div class="icon-circle icon-success">
            <span>✅</span>
        </div>
        <p class="status-text">Saved successfully!</p>
        <a id="link-open-notion" href="#" class="btn btn-primary" target="_blank" rel="noopener">Open in Notion</a>
    </div>

    <!-- Error -->
    <div id="state-error" class="state hidden">
        <div class="icon-circle icon-error">
            <span>⚠️</span>
        </div>
        <p id="error-message" class="status-text error-text">Something went wrong.</p>
        <button id="btn-retry" class="btn btn-primary">Try Again</button>
    </div>

    <!-- Settings -->
    <div id="state-settings" class="state hidden">
        <div class="settings-header">
            <button id="btn-back" class="btn-icon" title="Back" aria-label="Back">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 4l-6 6 6 6"/>
                </svg>
            </button>
            <h3>Settings</h3>
        </div>
        <label for="select-database" class="field-label">Database</label>
        <select id="select-database" class="select">
            <option value="" disabled selected>Loading databases…</option>
        </select>
        <div id="page-picker" class="hidden">
            <label for="select-parent-page" class="field-label">Parent Page</label>
            <select id="select-parent-page" class="select">
                <option value="" disabled selected>Choose a page…</option>
            </select>
        </div>
        <button id="btn-create-db" class="btn btn-secondary">Create New Database</button>
        <hr class="divider">
        <button id="btn-disconnect" class="btn btn-destructive">Disconnect from Notion</button>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>
