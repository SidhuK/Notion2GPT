<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notion2GPT — Connecting…</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #1a1a1a; color: #e5e5e5; }
        }
        .card {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #ddd;
            border-top-color: #2F80ED;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fallback { margin-top: 1.5rem; font-size: 0.85rem; color: #888; }
        a { color: #2F80ED; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <p>Redirecting to Notion2GPT…</p>
        <p class="fallback" id="fallback" style="display:none;">
            If the app didn't open, <a id="manual-link" href="#">click here</a>.
        </p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');

        // The Safari extension's background.js intercepts this page via
        // webNavigation.onCompleted, reads the code/state from the URL,
        // exchanges the token, and closes this tab automatically.
        if (!code && !error) {
            document.querySelector('.spinner').style.display = 'none';
            document.querySelector('p').textContent = 'Invalid callback — missing authorization code.';
        } else {
            // Tab will be closed automatically by the extension
            setTimeout(function() {
                document.getElementById('fallback').style.display = 'block';
                document.querySelector('#fallback').textContent =
                    'If this tab wasn\u2019t closed automatically, you can close it and return to Safari.';
            }, 3000);
        }
    </script>
</body>
</html>
